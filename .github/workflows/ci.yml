name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  backend-java:
    name: Backend Java
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect backend module
        id: backend
        shell: bash
        run: |
          if [ -f backend-java/pom.xml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java
        if: steps.backend.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Test
        if: steps.backend.outputs.exists == 'true'
        working-directory: backend-java
        run: mvn -B test

      - name: Skip backend tests
        if: steps.backend.outputs.exists != 'true'
        run: echo "backend-java module not present in this revision."

  model-service:
    name: Model Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Nonescape mini service
        id: model_service
        shell: bash
        run: |
          if [ -f model-services/nonescape-mini/requirements.txt ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.model_service.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: model-services/nonescape-mini/requirements.txt

      - name: Install dependencies
        if: steps.model_service.outputs.exists == 'true'
        working-directory: model-services/nonescape-mini
        run: pip install -r requirements.txt

      - name: Test
        if: steps.model_service.outputs.exists == 'true'
        working-directory: model-services/nonescape-mini
        run: pytest

      - name: Skip model service tests
        if: steps.model_service.outputs.exists != 'true'
        run: echo "Nonescape mini model service not present in this revision."
