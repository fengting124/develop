spring:
  application:
    name: image-authenticity-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aigc_forensics}
    username: ${DB_USERNAME:aigc}
    password: ${DB_PASSWORD:aigc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

app:
  storage:
    root: ${STORAGE_ROOT:storage}
  model-registry:
    synchronization-enabled: ${APP_MODEL_REGISTRY_SYNCHRONIZATION_ENABLED:true}
    nonescape-mini:
      endpoint-url: ${APP_MODEL_REGISTRY_NONESCAPE_MINI_ENDPOINT_URL:http://localhost:5010}
