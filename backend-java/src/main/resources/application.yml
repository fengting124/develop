spring:
  application:
    name: image-authenticity-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aigc_forensics}
    username: ${DB_USERNAME:aigc}
    password: ${DB_PASSWORD:aigc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

app:
  storage:
    root: ${STORAGE_ROOT:storage}
  detection:
    jobs:
      worker-enabled: ${APP_DETECTION_JOBS_WORKER_ENABLED:true}
      poll-delay-ms: ${APP_DETECTION_JOBS_POLL_DELAY_MS:1000}
      redis:
        stream-key: ${APP_DETECTION_JOBS_REDIS_STREAM_KEY:detection:jobs}
        group-name: ${APP_DETECTION_JOBS_REDIS_GROUP_NAME:detection-workers}
        consumer-name: ${APP_DETECTION_JOBS_REDIS_CONSUMER_NAME:${spring.application.name}}
        submitted-key-prefix: ${APP_DETECTION_JOBS_REDIS_SUBMITTED_KEY_PREFIX:detection:jobs:submitted:}
        submitted-ttl: ${APP_DETECTION_JOBS_REDIS_SUBMITTED_TTL:6h}
        block-timeout: ${APP_DETECTION_JOBS_REDIS_BLOCK_TIMEOUT:2s}
  model-registry:
    synchronization-enabled: ${APP_MODEL_REGISTRY_SYNCHRONIZATION_ENABLED:true}
    nonescape-mini:
      endpoint-url: ${APP_MODEL_REGISTRY_NONESCAPE_MINI_ENDPOINT_URL:http://localhost:5010}
