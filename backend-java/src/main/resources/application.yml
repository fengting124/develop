spring:
  application:
    name: image-authenticity-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aigc_forensics}
    username: ${DB_USERNAME:aigc}
    password: ${DB_PASSWORD:aigc}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:10MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:11MB}

server:
  port: ${SERVER_PORT:8080}

app:
  storage:
    root: ${STORAGE_ROOT:storage}
  upload:
    max-bytes: ${APP_UPLOAD_MAX_BYTES:10485760}
    max-width: ${APP_UPLOAD_MAX_WIDTH:8192}
    max-height: ${APP_UPLOAD_MAX_HEIGHT:8192}
    max-pixels: ${APP_UPLOAD_MAX_PIXELS:25000000}
    max-filename-length: ${APP_UPLOAD_MAX_FILENAME_LENGTH:255}
  jobs:
    outbox:
      dispatcher-enabled: ${APP_JOBS_OUTBOX_DISPATCHER_ENABLED:true}
      poll-delay-ms: ${APP_JOBS_OUTBOX_POLL_DELAY_MS:500}
      stale-after: ${APP_JOBS_OUTBOX_STALE_AFTER:1m}
      max-attempts: ${APP_JOBS_OUTBOX_MAX_ATTEMPTS:5}
      base-retry-delay: ${APP_JOBS_OUTBOX_BASE_RETRY_DELAY:1s}
      max-retry-delay: ${APP_JOBS_OUTBOX_MAX_RETRY_DELAY:1m}
  detection:
    execution:
      lease-duration: ${APP_DETECTION_EXECUTION_LEASE_DURATION:5m}
    jobs:
      worker-enabled: ${APP_DETECTION_JOBS_WORKER_ENABLED:true}
      poll-delay-ms: ${APP_DETECTION_JOBS_POLL_DELAY_MS:1000}
      redis:
        stream-key: ${APP_DETECTION_JOBS_REDIS_STREAM_KEY:detection:jobs}
        group-name: ${APP_DETECTION_JOBS_REDIS_GROUP_NAME:detection-workers}
        consumer-name: ${APP_DETECTION_JOBS_REDIS_CONSUMER_NAME:${spring.application.name}}
        dead-letter-stream-key: ${APP_DETECTION_JOBS_REDIS_DEAD_LETTER_STREAM_KEY:detection:jobs:dead-letter}
        submitted-key-prefix: ${APP_DETECTION_JOBS_REDIS_SUBMITTED_KEY_PREFIX:detection:jobs:submitted:}
        submitted-ttl: ${APP_DETECTION_JOBS_REDIS_SUBMITTED_TTL:6h}
        block-timeout: ${APP_DETECTION_JOBS_REDIS_BLOCK_TIMEOUT:2s}
        pending-idle-timeout: ${APP_DETECTION_JOBS_REDIS_PENDING_IDLE_TIMEOUT:5m}
        pending-claim-batch-size: ${APP_DETECTION_JOBS_REDIS_PENDING_CLAIM_BATCH_SIZE:10}
        max-delivery-attempts: ${APP_DETECTION_JOBS_REDIS_MAX_DELIVERY_ATTEMPTS:3}
  model-registry:
    synchronization-enabled: ${APP_MODEL_REGISTRY_SYNCHRONIZATION_ENABLED:true}
    nonescape-mini:
      endpoint-url: ${APP_MODEL_REGISTRY_NONESCAPE_MINI_ENDPOINT_URL:http://localhost:5010}
