spring:
  main:
    banner-mode: "off"
  datasource:
    url: jdbc:h2:mem:aigc_forensics_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false

logging:
  level:
    root: warn
    org.hibernate.SQL: warn
    org.springframework: warn

app:
  model-registry:
    synchronization-enabled: false
