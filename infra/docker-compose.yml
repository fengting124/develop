services:
  postgres:
    image: postgres:16-alpine
    container_name: aigc-forensics-postgres
    environment:
      POSTGRES_DB: aigc_forensics
      POSTGRES_USER: aigc
      POSTGRES_PASSWORD: aigc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigc -d aigc_forensics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
