name: aigc-forensics

services:
  postgres:
    image: postgres:16-alpine
    container_name: aigc-forensics-postgres
    environment:
      POSTGRES_DB: aigc_forensics
      POSTGRES_USER: aigc
      POSTGRES_PASSWORD: aigc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aigc -d aigc_forensics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: aigc-forensics-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nonescape-mini:
    build:
      context: ../model-services/nonescape-mini
    image: aigc-forensics/nonescape-mini:local
    container_name: aigc-forensics-nonescape-mini
    ports:
      - "5010:5010"
    volumes:
      - shared-storage:/data/storage:ro
      - model-weights:/models/weights
    environment:
      MODEL_WEIGHTS_DIR: /models/weights
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5010/health', timeout=2).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: backend-java/Dockerfile
    image: aigc-forensics/backend:local
    container_name: aigc-forensics-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nonescape-mini:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aigc_forensics
      DB_USERNAME: aigc
      DB_PASSWORD: aigc
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
      STORAGE_ROOT: /data/storage
      APP_MODEL_REGISTRY_NONESCAPE_MINI_ENDPOINT_URL: http://nonescape-mini:5010
    ports:
      - "8080:8080"
    volumes:
      - shared-storage:/data/storage
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  shared-storage:
  model-weights:
